<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Smart Waste Detector</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #0f1117;
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1e2130;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 8px;
      color: #39ff9a;
    }

    p.subtitle {
      color: #8b95a3;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .upload-area {
      border: 2px dashed #39ff9a;
      border-radius: 12px;
      padding: 40px 20px;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.2s;
    }

    .upload-area:hover { background: rgba(57,255,154,0.05); }

    .upload-area p { color: #8b95a3; font-size: 14px; margin-top: 8px; }

    #preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      margin-bottom: 10px;
      display: none;
    }

    input[type="file"] { display: none; }

    button {
      background: #39ff9a;
      color: #0f1117;
      border: none;
      padding: 14px 40px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    button:hover { background: #2de085; }
    button:disabled { background: #555; cursor: not-allowed; }

    #result {
      margin-top: 24px;
      padding: 20px;
      border-radius: 12px;
      display: none;
    }

    #result.biodegradable {
      background: rgba(39,174,96,0.15);
      border: 1px solid #27ae60;
    }

    #result.non-biodegradable {
      background: rgba(231,76,60,0.15);
      border: 1px solid #e74c3c;
    }

    #result h2 { font-size: 20px; margin-bottom: 8px; }
    #result p  { font-size: 14px; color: #ccc; margin-top: 6px; }

    .confidence {
      font-size: 12px;
      color: #8b95a3;
      margin-top: 8px;
    }

    #loading {
      display: none;
      margin-top: 20px;
      color: #8b95a3;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Smart Waste Detector</h1>
  <p class="subtitle">Upload an image to find out if it's biodegradable or not</p>

  <div class="upload-area" onclick="document.getElementById('fileInput').click()">
    <img id="preview" src="" alt="preview"/>
    <p id="upload-text">Click here to upload an image</p>
  </div>

  <input type="file" id="fileInput" accept="image/*" onchange="handleFile(event)"/>

  <button id="analyzeBtn" onclick="analyze()" disabled>
    Analyze Waste
  </button>

  <div id="loading">Analyzing image... please wait</div>

  <div id="result">
    <h2 id="result-label"></h2>
    <p id="result-material"></p>
    <p id="result-explanation"></p>
    <p id="result-tip"></p>
    <p class="confidence" id="result-confidence"></p>
  </div>
</div>

<script>
  let selectedFile = null;

  function handleFile(event) {
    selectedFile = event.target.files[0];
    if (!selectedFile) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById('preview');
      preview.src = e.target.result;
      preview.style.display = 'block';
      document.getElementById('upload-text').style.display = 'none';
      document.getElementById('analyzeBtn').disabled = false;
      document.getElementById('result').style.display = 'none';
    };
    reader.readAsDataURL(selectedFile);
  }

  async function analyze() {
    if (!selectedFile) return;

    const btn = document.getElementById('analyzeBtn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');

    btn.disabled = true;
    loading.style.display = 'block';
    result.style.display = 'none';

    const formData = new FormData();
    formData.append('image', selectedFile);

    try {
      const response = await fetch('/predict', {
        method: 'POST',
        body: formData
      });

      const data = await response.json();

      if (data.error) {
        alert('Error: ' + data.error);
        return;
      }

      const isBio = data.classification === 'BIODEGRADABLE';

      result.className = isBio ? 'biodegradable' : 'non-biodegradable';
      document.getElementById('result-label').textContent =
        isBio ? '🟢 Biodegradable' : '🔴 Non-Biodegradable';
      document.getElementById('result-label').style.color =
        isBio ? '#27ae60' : '#e74c3c';
      document.getElementById('result-material').textContent =
        'Material: ' + data.material;
      document.getElementById('result-explanation').textContent =
        data.explanation;
      document.getElementById('result-tip').textContent =
        'Tip: ' + data.disposal_tip;
      document.getElementById('result-confidence').textContent =
        'Confidence: ' + data.confidence + '%';

      result.style.display = 'block';

    } catch (err) {
      alert('Something went wrong. Is the server running?');
    } finally {
      btn.disabled = false;
      loading.style.display = 'none';
    }
  }
</script>

</body>
</html>
